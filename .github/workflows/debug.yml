name: debug

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner
        type: choice
        options:
          - ubuntu-24.04-arm
          - ubuntu-latest
      maxSpace:
        description: Maximize space
        type: boolean
      port80:
        description: Port 80
        type: boolean
        default: true

jobs:
  debug:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Maximize space (arm)
        if: ${{ inputs.maxSpace && endsWith(inputs.runner,'arm') }}
        uses: samueldr/more-space-action@latest
        with:
          enable-lvm-span: true
          swapfile-size: 16GiB
          lvm-span-free-space: '{"/": "34359738368"}'
          lvm-span-mountpoint: ${{ github.workspace }}
          enable-remove-default-apt-patterns: false

      - name: Maximize space
        if: ${{ inputs.maxSpace && !endsWith(inputs.runner,'arm') }}
        uses: fawazahmed0/maximize-build-space@master
        with:
          root-reserve-mb: 16384
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: inst.sh
        env:
          INST_SH: ${{ secrets.INST_SH }}
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
        run: bash -c "$INST_SH"

      - name: Port 80
        if: ${{ inputs.port80 }}
        run: sudo cloudflared tunnel --url 127.0.0.1:80 > /tmp/cf80.log 2>&1 &

      - name: ttyd
        env:
          AUTH: ${{ secrets.AUTH }}
          RCLONE_CONFIG_PASS: ${{ secrets.RCLONE_CONFIG_PASS }}
          GH_TOKEN: ${{ secrets.TOKEN_REPO }}
        run: |
          [ -f /tmp/cf80.log ] && echo port 80:  $(tail -fn20 /tmp/cf80.log | grep -m 1 -oE 'https://[^\.]+.trycloudflare.com')
          echo ttyd:  $(tail -fn20 /tmp/cfttyd.log | grep -m 1 -oE 'https://[^\.]+.trycloudflare.com')

          ttyd -W -d3 -t titleFixed=ttyd -t fontSize=16 -t 'theme={"background":"#0009"}' -t enableSixel=true -t enableZmodem=true bash
